        <svg id="icon-open" class="w-5 h-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

        </svg>
        <svg id="icon-close" class="w-5 h-5 text-gray-700 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

      <p id="proj-loading" class="text-sm text-gray-400">Loading…</p>

          <h1 id="proj-title" class="text-2xl font-bold text-gray-900"></h1>
          <time id="proj-time" class="text-sm text-gray-400"></time>
        </div>
        <div id="proj-tags" class="flex flex-wrap gap-2 mb-6"></div>
        <div id="proj-links" class="flex flex-wrap gap-4 text-xs"></div>
      </header>

      <hr id="proj-hr" class="border-gray-100 mb-10 hidden" />

      <!-- ========== PROJECT CONTENT (markdown rendered here) ========== -->
      <article id="proj-content" class="project-content"></article>

      <nav id="proj-nav" class="mt-16 pt-8 border-t border-gray-100 flex justify-between text-xs text-gray-400 hidden">
        <span id="proj-prev-container"></span>
